root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "GOPROXY=https://goproxy.cn,direct go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  full_bin = "bash -c 'set -a; source .env.dev 2>/dev/null; set +a; exec ./tmp/server'"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", "testdata", ".git"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  delay = 500
  stop_on_error = false
  send_interrupt = true
  kill_delay = 500

[log]
  time = true

[color]
  main = "cyan"
  build = "green"
  runner = "yellow"

[misc]
  clean_on_exit = true
